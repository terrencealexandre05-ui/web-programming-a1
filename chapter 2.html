<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Nature Photography Gallery</h1>

    <div class="gallery">

        <!-- Image 1 -->
        <div class="image-card">
            <img 
                src="images/forest.jpg"
                alt="Green forest with sunlight shining through trees"
                title="Beautiful Forest"
                width="400"
                height="250"
            >

            <p class="license">
                License: Free for commercial use from Unsplash.
            </p>
        </div>

        <!-- Image 2 -->
        <div class="image-card">
            <img 
                src="images/mountain.jpg"
                alt="Snowy mountain landscape during sunset"
                title="Mountain Sunset"
                width="400"
                height="250"
            >

            <p class="license">
                License: Free for commercial use from Pexels.
            </p>
        </div>

        <!-- Image 3 -->
        <div class="image-card">
            <img 
                src="images/ocean.jpg"
                alt="Blue ocean waves hitting the shore"
                title="Ocean Waves"
                width="400"
                height="250"
            >

            <p class="license">
                License: Free for commercial use from Pixabay.
            </p>
        </div>

    </div>

</body>
</html>
